server { 
 listen 80;
 server_name frontend;
 location / {
   root /usr/share/nginx/html;
   try_files $uri /index.html;
 }
 
 location /api/ {
  proxy_pass http://localhost:8090/api/;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
 }
 
 location /_/ {
  proxy_pass http://localhost:8090/_/;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
 }
}
